name: Release

# Cut a release by pushing a semver tag, e.g. `git tag v1.0.0 && git push origin v1.0.0`.
# The tag drives three things: it must match the workspace version, it publishes the
# workspace to crates.io, and it builds the `osproxy` binary (default + FIPS) and
# attaches it to an auto-created GitHub Release.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*" # pre-releases, e.g. v1.0.0-rc.1

permissions:
  contents: write # create the GitHub Release and upload binary assets

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fail fast if the pushed tag does not match the version in Cargo.toml, so a
  # mistagged push can never publish the wrong version to crates.io.
  guard:
    name: Tag matches workspace version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.94.1
      - name: Compare tag to crate version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="osproxy-core") | .version')"
          echo "tag=$tag crate=$ver"
          test "$tag" = "$ver" || { echo "::error::tag $tag != workspace version $ver"; exit 1; }

  # Publish every publishable crate to crates.io, one at a time in dependency
  # order. We deliberately do NOT use `cargo publish --workspace`: it is not
  # idempotent — if any member is already on the registry (e.g. a prior run
  # published a prefix before hitting the new-crate rate limit) it aborts at the
  # first "already exists" and never reaches the rest. The per-crate loop skips
  # already-published crates and stops cleanly on a 429 so a re-run resumes where
  # it left off. `publish = false` crates (osproxy-bench, xtask) are omitted.
  # Requires a CRATES_IO_TOKEN repository secret.
  crates-io:
    name: Publish to crates.io
    needs: guard
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      # The gRPC ingress build (osproxy-transport build.rs) compiles the proto, so
      # each crate's verify-build needs protoc on the host.
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Publish crates in dependency order (idempotent)
        run: |
          set -u
          ver="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="osproxy-core") | .version')"
          # Dependency order: a crate appears after everything it depends on.
          order="osproxy-core osproxy-config osproxy-spi osproxy-observe \
            osproxy-rewrite osproxy-capture osproxy-otlp osproxy-etcd osproxy-sink \
            osproxy-transport osproxy-tenancy osproxy-kafka osproxy-kafka-wal \
            osproxy-kafka-krafka osproxy-control osproxy-engine osproxy-server"
          for c in $order; do
            # Already on the registry at this version? Skip (idempotent re-run).
            code=$(curl -s -o /dev/null -w '%{http_code}' "https://crates.io/api/v1/crates/$c/$ver")
            if [ "$code" = "200" ]; then echo "✓ $c@$ver already published — skip"; continue; fi
            echo "→ publishing $c@$ver"
            if out=$(cargo publish -p "$c" --locked 2>&1); then
              echo "$out" | tail -2
            else
              echo "$out" | tail -8
              if echo "$out" | grep -qi 'already exists'; then
                echo "✓ $c already exists — skip"; continue
              fi
              if echo "$out" | grep -qiE '429|too many requests|rate limit'; then
                echo "::warning::new-crate rate limit hit at $c; re-run this job after the reset to resume"
                exit 2
              fi
              echo "::error::publish failed for $c"; exit 1
            fi
          done
          echo "all publishable crates are live at $ver"

  # Build the shipped binary in both flavors and attach them to the Release.
  # Independent of crates.io so a registry hiccup never blocks the binaries.
  binaries:
    name: Build ${{ matrix.flavor }} binary
    needs: guard
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: default
            features: ""
            suffix: ""
            # Default (ring) build runs on the standard image.
            os: ubuntu-latest
          - flavor: fips
            features: "--no-default-features --features fips"
            suffix: "-fips"
            # PINNED for the FIPS build, exactly like the CI fips job: AWS-LC-FIPS's
            # delocate only parses assembly from supported compiler versions, so the
            # image is a compliance-relevant constant, never `ubuntu-latest`.
            os: ubuntu-24.04
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      # protoc for the gRPC ingress build; cmake for the FIPS flavor's AWS-LC-FIPS
      # native build (a no-op cost on the default flavor, kept uniform for clarity).
      - name: Install build toolchain
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler cmake
      - name: Build osproxy (${{ matrix.flavor }})
        run: cargo build -p osproxy-server --bin osproxy --release --locked ${{ matrix.features }}
      # Name the asset by version + target + flavor, and emit a checksum beside it.
      - name: Stage release asset
        run: |
          name="osproxy-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu${{ matrix.suffix }}"
          mkdir -p dist
          cp target/release/osproxy "dist/$name"
          sha256sum "dist/$name" > "dist/$name.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: osproxy-${{ matrix.flavor }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create / update the Release
        uses: softprops/action-gh-release@v2
        with:
          # GitHub renders auto-generated notes from the commits since the last tag.
          generate_release_notes: true
          # A tag with a pre-release suffix (rc/beta/alpha) is marked pre-release.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/*
          fail_on_unmatched_files: true
