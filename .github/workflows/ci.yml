name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  gate:
    name: Build & full gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned to match rust-toolchain.toml exactly, so clippy's lint set is
      # identical locally and here (docs/12).
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # Single source of truth: the same gate developers run locally
      # (fmt, clippy -D warnings, arch, test, doc, budgets, skills).
      - run: cargo xtask ci

  deny:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check

  coverage:
    name: Coverage (>=90%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      # `--lib --tests` excludes benches (iai-callgrind needs valgrind, absent
      # here) and matches what `cargo xtask test` measures.
      - run: cargo llvm-cov --workspace --lib --tests --fail-under-lines 90 --ignore-filename-regex 'xtask|osproxy-server'

  perf:
    name: Deterministic perf (iai-callgrind)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind
      - name: Install iai-callgrind-runner
        # Must match the iai-callgrind dev-dependency version in osproxy-core.
        uses: taiki-e/install-action@v2
        with:
          tool: iai-callgrind-runner@0.14.2
      - name: Instruction-count benchmarks
        run: cargo xtask bench
