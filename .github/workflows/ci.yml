name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  gate:
    name: Build & full gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Pinned to match rust-toolchain.toml exactly, so clippy's lint set is
      # identical locally and here (docs/12).
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # The gRPC ingress build (osproxy-transport build.rs via tonic-prost-build)
      # compiles proto/osproxy.proto, which needs `protoc` on the build host.
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      # Single source of truth: the same gate developers run locally
      # (fmt, clippy -D warnings, arch, test, doc, budgets, skills). The FIPS
      # build/test is skipped here and owned by the dedicated `fips` job below, so
      # the native AWS-LC-FIPS build is not paid for twice.
      - run: cargo xtask ci
        env:
          OSPROXY_SKIP_FIPS: "1"

  fips:
    name: FIPS build & release artifact
    # PINNED image, not `ubuntu-latest`: the FIPS build toolchain must be
    # deterministic (docs/07 §4, fips-boundary.md §4). AWS-LC-FIPS's delocate
    # (the FIPS integrity transform) only parses assembly from supported compiler
    # versions — a bleeding-edge gcc (e.g. 15) fails it at -O3. 24.04 ships a
    # gcc that AWS-LC-FIPS supports; bumping this image is a compliance event.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      # AWS-LC-FIPS compiles from C: cmake + a C compiler + Go. These are present
      # on the pinned image; install cmake explicitly so it is reproducible and
      # the job fails loudly if the image ever drops it.
      # protobuf-compiler: the gRPC ingress build needs `protoc` (see the gate job).
      - name: Install FIPS build toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake protobuf-compiler
      - name: Record toolchain provenance
        run: |
          cmake --version
          cc --version
          go version
      # Builds and TESTS the fips feature: tests/fips.rs asserts the linked
      # aws-lc-rs module reports FIPS mode and offers exactly the approved suites.
      - name: FIPS build & tests
        run: cargo xtask check-fips
      # M6 exit criterion (docs/11): the shipped release artifact must be
      # FIPS-built — never the default `ring` provider. `--no-default-features`
      # guarantees the non-fips provider is not linked.
      - name: Release artifact is FIPS-built
        run: cargo build -p osproxy-server --bin osproxy --release --no-default-features --features fips

  deny:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check

  coverage:
    name: Coverage (>=90%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: taiki-e/install-action@cargo-llvm-cov
      # `--lib --tests` excludes benches (iai-callgrind needs valgrind, absent
      # here) and matches what `cargo xtask test` measures. We exclude the binary
      # entrypoint (osproxy-server/src/main.rs is process wiring run by no test),
      # xtask, and the Docker-gated `#[ignore]` integration harnesses
      # (testcontainer/perf_harness/soak — they only run with `--ignored` against a
      # live container, so under coverage their scaffolding reads as uncovered).
      # The server's *library* code (auth, handler, tenancy) is tested and counted.
      # `tests/memory.rs` are dhat allocation-budget tests; they self-skip under
      # instrumentation (the counts are meaningless there) so their bodies don't
      # count toward the line percentage — exclude them from attribution too.
      - run: cargo llvm-cov --workspace --lib --tests --fail-under-lines 90 --ignore-filename-regex 'xtask|osproxy-server/src/main\.rs|tests/(testcontainer|perf_harness|soak|memory)\.rs'

  perf:
    name: Deterministic perf (iai-callgrind)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      # valgrind for iai-callgrind; protobuf-compiler for the gRPC build (`protoc`).
      - name: Install valgrind and protoc
        run: sudo apt-get update && sudo apt-get install -y valgrind protobuf-compiler
      - name: Install iai-callgrind-runner
        # Must match the iai-callgrind dev-dependency version in osproxy-core.
        uses: taiki-e/install-action@v2
        with:
          tool: iai-callgrind-runner@0.16.1
      - name: Instruction-count benchmarks
        run: cargo xtask bench

  integration:
    name: Live integration (Docker)
    # The GitHub-hosted Ubuntu runner ships a running Docker daemon, so
    # testcontainers can start a real OpenSearch — the only lane that exercises the
    # proxy end-to-end against a live cluster rather than a mock.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      # The `#[ignore]`'d testcontainer harnesses: the M1 round-trip exit gate plus
      # the NFR-P runners (added-latency profile, scalability sweep, idle/soak
      # footprint). `--test-threads=1` keeps a single OpenSearch container up at a
      # time — within the runner's memory, and so a perf run is never measured
      # against a noisy neighbour. The harnesses assert host-independent invariants
      # (correctness, completeness, pool reuse, throughput scaling, bounded
      # footprint); the absolute latency numbers are recorded, not gated.
      - name: Live integration + NFR-P harnesses
        run: cargo test -p osproxy-server --test testcontainer --test perf_harness --test soak -- --ignored --nocapture --test-threads=1
      # The async fan-out round-trip (docs/04 §9): produce a real op envelope to a
      # containerized Kafka and read it back. Needs the `kafka` feature, so
      # it is a separate invocation from the default-feature harnesses above.
      - name: Async fan-out Kafka round-trip
        run: cargo test -p osproxy-server --features kafka --bin osproxy kafka_round_trip -- --ignored --nocapture --test-threads=1
      # Render the Markdown briefs the runners emit into the job summary, so the
      # latency / scalability / footprint tables and verdicts show up on the run
      # page itself — the consolidated view an operator (or an LLM) reads.
      - name: NFR-P brief to job summary
        if: always()
        run: |
          {
            echo "## NFR-P brief (live OpenSearch)"
            echo
            cat target/**/nfr-*.md 2>/dev/null || echo "_no NFR-P briefs emitted_"
          } >> "$GITHUB_STEP_SUMMARY"
      # Publish the machine-readable profile/verdict JSON and the briefs the runners
      # emit (the substrate an operator or an LLM judges) as a downloadable artifact.
      - name: Upload NFR-P artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nfr-profiles
          path: |
            target/**/nfr-*.json
            target/**/nfr-*.md
          if-no-files-found: ignore
