name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  gate:
    name: Build & full gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Mirrors `cargo xtask ci` (fmt, clippy, test, doc, budgets) but as
      # discrete steps so a failure is attributed precisely in the UI.
      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Architecture (dependency graph)
        run: cargo xtask arch

      - name: Test
        run: cargo test --workspace --all-targets

      - name: Doc (deny warnings) + doc tests
        run: |
          RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --document-private-items
          cargo test --workspace --doc

      - name: Size & complexity budgets
        run: cargo xtask budgets

      - name: Skill-system lint
        run: cargo xtask skills

  deny:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  coverage:
    name: Coverage (>=90%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Coverage gate
        # `--lib --tests` excludes benches (iai-callgrind needs valgrind, absent
        # in this job) and matches what `cargo xtask test` measures.
        run: cargo llvm-cov --workspace --lib --tests --fail-under-lines 90 --ignore-filename-regex 'xtask|osproxy-server'

  perf:
    name: Deterministic perf (iai-callgrind)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind
      - name: Install iai-callgrind-runner
        # Must match the iai-callgrind dev-dependency version in osproxy-core.
        uses: taiki-e/install-action@v2
        with:
          tool: iai-callgrind-runner@0.14.2
      - name: Instruction-count benchmarks
        run: cargo xtask bench
