name: Quality review (LLM)

# Tier 2 semantic/design review (docs/12). Advisory: it reviews the diff against
# the skills rubric (.agents/skills/quality-review) for what the deterministic
# gates cannot judge — altitude, cohesion, naming, doc/test meaningfulness.
#
# Requires the `ANTHROPIC_API_KEY` repository secret. If the secret is absent the
# job is skipped, so forks and unconfigured checkouts are unaffected.

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    name: Claude semantic review
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Skip if no API key
        id: guard
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "ANTHROPIC_API_KEY not set — skipping LLM review."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Claude review
        if: steps.guard.outputs.configured == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Review against the repo's own rubric so the bar matches local work.
          prompt: |
            Review this pull request as a Tier 2 semantic/design reviewer.
            Follow the rubric in .agents/skills/quality-review/SKILL.md and the
            invariants in AGENTS.md. The deterministic gates already passed, so do
            NOT comment on formatting, lints, or anything a check decides — focus
            only on altitude/abstraction, cohesion (god-type detection), naming &
            intent, error/doc/test meaningfulness, and invariant adherence. Mark
            each finding as gating (high-confidence) or advisory (uncertain).
