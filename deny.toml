# cargo-deny configuration — supply-chain, license, and advisory gates.
# See docs/08-engineering-standards.md §6.

[advisories]
version = 2
yanked = "deny"
# Unmaintained-crate notices reached only through dev/test-only dependencies
# (never in shipped artifacts). No safe upgrade exists; revisit when the
# upstream dev tools drop them. Vulnerabilities (not just unmaintained) are
# still denied.
ignore = [
    "RUSTSEC-2025-0141", # bincode unmaintained — via iai-callgrind (benches)
    "RUSTSEC-2026-0173", # proc-macro-error2 unmaintained — via iai-callgrind (benches)
    # rustls-pemfile deprecated — reached only through testcontainers' bollard
    # (dev/test infra, the M1 testcontainer exit gate); never in shipped
    # artifacts. Our own TLS code uses rustls-pki-types' PemObject directly.
    "RUSTSEC-2025-0134",
    # astral-tokio-tar < 0.6.0 tar-extraction vulnerabilities (PAX header
    # desync / symlink chmod / path validation). REAL vulnerabilities, accepted
    # ONLY because they are confined to the dev/test Docker tooling
    # (testcontainers -> bollard) used by the #[ignore]'d testcontainer exit
    # gate, operating on the trusted official OpenSearch image — never in a
    # shipped artifact and never extracting untrusted input. The fix needs
    # astral-tokio-tar 0.6, a breaking change testcontainers/bollard have not
    # yet adopted; remove these the moment they do.
    "RUSTSEC-2026-0066",
    "RUSTSEC-2026-0112",
    "RUSTSEC-2026-0113",
    "RUSTSEC-2026-0145",
]

[licenses]
version = 2
# Permissive licenses compatible with shipping an Apache-2.0 project.
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
