# cargo-deny configuration — supply-chain, license, and advisory gates.
# See docs/08-engineering-standards.md §6.

[advisories]
version = 2
yanked = "deny"
# Unmaintained-crate notices reached only through dev/test-only dependencies
# (never in shipped artifacts). No safe upgrade exists; revisit when the
# upstream dev tools drop them. Vulnerabilities (not just unmaintained) are
# still denied.
ignore = [
    "RUSTSEC-2025-0141", # bincode unmaintained — via dhat (memory-budget tests)
    "RUSTSEC-2026-0173", # proc-macro-error2 unmaintained — via iai-callgrind (benches)
]

[licenses]
version = 2
# Permissive licenses compatible with shipping an Apache-2.0 project.
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
